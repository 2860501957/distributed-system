ersion: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: seckill-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: seckill_db
      MYSQL_USER: seckill
      MYSQL_PASSWORD: seckill123
    ports:
      - "3306:3306"
    volumes:
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql-data:/var/lib/mysql
    networks:
      - seckill-network
    restart: always

  # Redis 缓存
  redis:
    image: redis:7.2
    container_name: seckill-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - seckill-network
    restart: always

  # 后端服务实例1（8081端口）
  seckill-backend-1:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: seckill-backend-1
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/seckill_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123456
      SPRING_REDIS_HOST: redis
    depends_on:
      - mysql
      - redis
    networks:
      - seckill-network
    restart: always

  # 后端服务实例2（8082端口）
  seckill-backend-2:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: seckill-backend-2
    environment:
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/seckill_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123456
      SPRING_REDIS_HOST: redis
    depends_on:
      - mysql
      - redis
    networks:
      - seckill-network
    restart: always

  # Nginx 负载均衡 + 动静分离
  nginx:
    build:
      context: ./docker/nginx
    container_name: seckill-nginx
    ports:
      - "80:80"
    depends_on:
      - seckill-backend-1
      - seckill-backend-2
    networks:
      - seckill-network
    restart: always

volumes:
  mysql-data:
  redis-data:

networks:
  seckill-network:
    driver: bridge


services:
  # ZooKeeper（Kafka依赖）
  zookeeper:
    image: confluentinc/cp-zookeeper:7.0.1
    container_name: seckill-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - seckill-network

  # Kafka 消息队列
  kafka:
    image: confluentinc/cp-kafka:7.0.1
    container_name: seckill-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
      - "29092:29092"
    networks:
      - seckill-network

      services:
  # Nacos 服务注册与配置中心
  nacos:
    image: nacos/nacos-server:v2.1.2
    container_name: seckill-nacos
    environment:
      MODE: standalone
      SPRING_DATASOURCE_PLATFORM: mysql
      MYSQL_SERVICE_HOST: mysql-master
      MYSQL_SERVICE_DB_NAME: seckill_nacos
      MYSQL_SERVICE_USER: root
      MYSQL_SERVICE_PASSWORD: root123456
    ports:
      - "8848:8848"
    networks:
      - seckill-network
    restart: always

  # Sentinel 流量治理控制台
  sentinel:
    image: bladex/sentinel-dashboard:1.8.6
    container_name: seckill-sentinel
    ports:
      - "8858:8858"
    networks:
      - seckill-network
    restart: always